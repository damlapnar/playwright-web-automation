name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          BASE_URL: https://www.saucedemo.com

      - name: Write step summary
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            PASSED=$(cat test-results/results.json | python3 -c "import sys,json; r=json.load(sys.stdin); print(sum(1 for s in r.get('suites',[]) for t in s.get('specs',[]) if t.get('ok')))" 2>/dev/null || echo "?")
            FAILED=$(cat test-results/results.json | python3 -c "import sys,json; r=json.load(sys.stdin); print(sum(1 for s in r.get('suites',[]) for t in s.get('specs',[]) if not t.get('ok')))" 2>/dev/null || echo "?")
            echo "## Playwright Results — ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
            echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30
