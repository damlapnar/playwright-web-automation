name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Audit dependencies (critical only)
        run: npm audit --audit-level=critical

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: api
            installBrowser: ''
          - project: chromium
            installBrowser: chromium
          - project: firefox
            installBrowser: firefox
          - project: webkit
            installBrowser: webkit
          - project: mobile-chrome
            installBrowser: chromium
          - project: mobile-safari
            installBrowser: webkit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Get installed Playwright version
        if: matrix.installBrowser != ''
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: matrix.installBrowser != ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: matrix.installBrowser != ''
        # --with-deps always re-installs OS-level packages (fonts/libs) since
        # those aren't cached, but it skips re-downloading browser binaries
        # that the cache step above already restored at the matching version.
        run: npx playwright install --with-deps ${{ matrix.installBrowser }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL: https://www.saucedemo.com

      - name: Write step summary
        if: always()
        run: python3 .github/scripts/write-step-summary.py
        env:
          MATRIX_PROJECT: ${{ matrix.project }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-${{ matrix.project }}
          path: allure-report/
          if-no-files-found: ignore
          retention-days: 30
