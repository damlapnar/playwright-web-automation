name: Update Visual Snapshots

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Regenerate visual snapshots
        run: npx playwright test tests/e2e/visual.spec.ts --project=${{ matrix.browser }} --update-snapshots
        env:
          BASE_URL: https://www.saucedemo.com

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-${{ matrix.browser }}
          path: tests/e2e/visual.spec.ts-snapshots/
